<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Formulário em HTML</title>
</head>

<body>
    <header>
        <h1>FORMULÁRIO EM HTML</h1>
    </header>

    <div class="container">
        <h3>Cadastro</h3>
        <form action="/enviar_dados" method="POST" id="formulario">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome">
            <div id="erro_nome" class="erro"></div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Seu e-mail">
            <div id="erro_email" class="erro"></div>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha">
            <div id="erro_senha" class="erro"></div>
            <br>
            <label for="perfil">Selecione seu perfil:</label>
            <select id="perfil" name="perfil">
                <option value="estudante">Estudante</option>
                <option value="profissional">Profissional</option>
            </select>
            <br>
            <br>
            <label for="biografia">Fale um pouco sobre você:</label>
            <br>
            <br>
            <textarea id="biografia" name="biografia" placeholder="Sua biografia aqui..."></textarea>
            <button type="submit">Enviar Cadastro</button>
        </form>
        <div class="resultado" id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
